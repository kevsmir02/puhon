name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            arch: x86_64
            asset_arch: amd64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            rpm \
            xdg-utils \
            libfuse2t64

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Puhon ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install. Auto-update is built in."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }} --bundles appimage,rpm,deb

      # Strip bundled libwayland-* so recent Mesa (Fedora 43 / Arch / Bazzite)
      # loads host copies; re-sign and re-upload the AppImage. Ported verbatim
      # from upstream crynta/terax-ai, parameterized for arch.
      - name: Fix AppImage wayland libs and re-sign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APPIMAGE=$(ls src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage | head -n1)
          BASENAME=$(basename "$APPIMAGE")
          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/"
          pushd "$WORK" >/dev/null
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-cursor.so.0 \
                squashfs-root/usr/lib/libwayland-server.so.0
          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-${{ matrix.arch }}.AppImage
          chmod +x appimagetool.AppImage
          ARCH=${{ matrix.arch }} ./appimagetool.AppImage --appimage-extract-and-run squashfs-root "$BASENAME"
          popd >/dev/null
          cp "$WORK/$BASENAME" "$APPIMAGE"
          rm -f "$APPIMAGE.sig"
          pnpm tauri signer sign "$APPIMAGE"
          gh release upload "${GITHUB_REF_NAME}" "$APPIMAGE" "$APPIMAGE.sig" --clobber

  # Patch the re-signed AppImage signature into the combined latest.json so
  # AppImage auto-update is valid. Runs after both arch legs finish.
  patch-appimage-updater:
    needs: publish-tauri
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Patch latest.json with re-signed AppImage signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" --pattern "latest.json" --clobber
          for SUFFIX in amd64 x86_64; do
            gh release download "$TAG" --pattern "*_${SUFFIX}.AppImage.sig" --clobber || true
            SIG_FILE=$(ls ./*_${SUFFIX}.AppImage.sig 2>/dev/null | head -n1 || true)
            [ -n "$SIG_FILE" ] || continue
            NEW_SIG=$(cat "$SIG_FILE")
            KEY="linux-x86_64"
            jq -e --arg key "$KEY" 'has("platforms") and (.platforms | has($key))' latest.json >/dev/null \
              || { echo "latest.json missing platforms.$KEY"; exit 1; }
            jq --arg sig "$NEW_SIG" --arg key "$KEY" \
              '.platforms[$key].signature = $sig' latest.json > latest.json.tmp
            mv latest.json.tmp latest.json
          done
          gh release upload "$TAG" latest.json --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false
